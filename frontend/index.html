<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OpenWhisper</title>
    <link rel="stylesheet" href="./src/style.css"/>
</head>
<body>
<div id="app">

    <!-- Barra compacta: siempre visible -->
    <div class="bar" style="--wails-draggable:drag">
        <button class="mic-btn" id="mic-btn" title="Grabar (Ctrl+Space)" style="--wails-draggable:no-drag">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>
        <span class="status-text" id="status-text">Listo</span>
        <div class="actions" style="--wails-draggable:no-drag">
            <button class="btn-icon btn-settings-toggle" id="btn-settings" title="Configuracion">&#9881;</button>
            <button class="btn-icon btn-hide" id="btn-close" title="Ocultar">&#8722;</button>
        </div>
    </div>

</div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
