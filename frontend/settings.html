<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OpenWhisper — Configuración</title>
    <link rel="stylesheet" href="./src/style.css"/>
    <style>
        html, body {
            overflow: auto;
            background: #121212;
        }
        #settings-root {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
        }
        h2 {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div id="settings-root">
    <h2>&#9881; Configuración</h2>

    <div class="field">
        <label for="api-key">API Key (Gemini)</label>
        <div class="input-row">
            <input type="password" id="api-key" placeholder="Pega tu API key aquí" autocomplete="off"/>
            <button class="btn-icon" id="btn-toggle-key" title="Mostrar/ocultar">&#128065;</button>
        </div>
    </div>

    <div class="field">
        <label for="model-input">Modelo</label>
        <input type="text" id="model-input" placeholder="gemini-2.0-flash"/>
    </div>

    <div class="btn-row">
        <button class="btn-primary" id="btn-save">Guardar</button>
        <button class="btn-secondary" id="btn-cancel">Cancelar</button>
    </div>

    <p id="status-msg" style="font-size:12px; color: rgba(255,255,255,0.45); min-height:16px;"></p>
</div>
<script type="module" src="./src/settings.js"></script>
</body>
</html>
